# workflow name shown in GitHub Actions UI
name: CI/CD — Build and Deploy to EC2  # name displayed in GitHub Actions

# events that trigger the workflow
on:
  workflow_dispatch:
    inputs:
      # input to choose app type
      app:
        description: 'Which app to deploy: "java" or "python"'
        type: choice
        options:
          - java
          - python
      # input to choose target environment
      environment:
        description: 'Deployment environment: dev, test, or prod'
        type: choice
        options:
          - dev
          - test
          - prod

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest  # use latest Ubuntu runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4  # get the repo code

      - name: Validate chosen app
        env:
          APP: ${{ github.event.inputs.app }}
        run: |
          # ensure only java or python is allowed
          case "${APP}" in
            java|python)
              echo "Deploying app='${APP}'" ;;
            *)
              echo "ERROR: Invalid app '${APP}'. Choose 'java' or 'python'" ; exit 1 ;;
          esac

      - name: Validate chosen environment
        env:
          ENV: ${{ github.event.inputs.environment }}
        run: |
          # ensure environment is valid
          case "${ENV}" in
            dev|test|prod)
              echo "Deploying environment='${ENV}'" ;;
            *)
              echo "ERROR: Invalid environment '${ENV}'" ; exit 1 ;;
          esac

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'  # setup JDK 17 for Maven

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository  # cache Maven dependencies
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Build Java jar
        if: ${{ github.event.inputs.app == 'java' }}
        run: |
          mvn -B -f CalculatorProject/pom.xml clean package -DskipTests  # build jar
          echo "🔍 DEBUG: Listing target dir after build"
          ls -l CalculatorProject/target   # debug to check jar

      - name: Upload Java artifact
        if: ${{ github.event.inputs.app == 'java' }}
        uses: actions/upload-artifact@v4
        with:
          name: calculator-jar
          path: CalculatorProject/target/*.jar   # 🔴 FIXED: use wildcard to ensure jar is uploaded
        run: |
          echo "🔍 DEBUG: Artifact path contents before upload"
          ls -l CalculatorProject/target

      - name: Package Python app
        if: ${{ github.event.inputs.app == 'python' }}
        run: |
          tar -czf calculator-py.tgz -C CalculatorProjectPy .  # package Python app

      - name: Upload Python package
        if: ${{ github.event.inputs.app == 'python' }}
        uses: actions/upload-artifact@v4
        with:
          name: calculator-py
          path: calculator-py.tgz

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4  # get repo again

      - name: Download Java artifact
        if: ${{ github.event.inputs.app == 'java' }}
        uses: actions/download-artifact@v4
        with:
          name: calculator-jar
          path: ./artifact  # download artifact to this folder

      - name: List downloaded artifact
        if: ${{ github.event.inputs.app == 'java' }}
        run: |
          echo "artifact directory contents:"; ls -l artifact || echo "no artifact directory"
          file artifact/CalculatorProject-1.0.jar || echo "jar not found"
          echo "🔍 DEBUG: Confirming artifact exists"
          ls -l artifact   # debug jar

      - name: Download Python package
        if: ${{ github.event.inputs.app == 'python' }}
        uses: actions/download-artifact@v4
        with:
          name: calculator-py
          path: ./artifact-py

      - name: Set server credentials
        run: |
          # set SERVER_IP based on environment
          case "${{ github.event.inputs.environment }}" in
            dev)
              echo "SERVER_IP=${{ secrets.SERVER_IP }}" >> $GITHUB_ENV
              ;;
            test)
              echo "SERVER_IP=${{ secrets.SERVER_IP_TEST }}" >> $GITHUB_ENV
              ;;
            prod)
              echo "SERVER_IP=${{ secrets.SERVER_IP_PROD }}" >> $GITHUB_ENV
              ;;
            *)
              echo "Unknown environment '${{ github.event.inputs.environment }}'" >&2; exit 1;;
          esac

      - name: Prepare SSH
        env:
          SERVER_IP: ${{ env.SERVER_IP }}
        run: |
          mkdir -p ~/.ssh
          case "${{ github.event.inputs.environment }}" in
            dev)
              printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
              ;;
            test|prod)
              printf '%s\n' "${{ secrets.SSH_KEY_PROD }}" > ~/.ssh/id_rsa
              ;;
            *)
              echo "Unknown environment" >&2; exit 1;;
          esac
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts  # add server to known_hosts

      - name: Add SSH key to agent
        run: |
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_rsa
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      - name: Copy Java files to server
        if: ${{ github.event.inputs.app == 'java' }}
        env:
          SERVER_IP: ${{ env.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          echo "copying jar to remote host"
          ls -l artifact || echo "artifact dir missing"
          scp -v -i ~/.ssh/id_rsa CalculatorProject/systemd/calculator.service "$SERVER_USER"@"$SERVER_IP":/tmp/calculator.service
          scp -v -i ~/.ssh/id_rsa artifact/*.jar "$SERVER_USER"@"$SERVER_IP":/tmp/   # 🔴 FIXED: wildcard ensures jar copied
          echo "remote tmp contents after copy:"
          ssh -i ~/.ssh/id_rsa "$SERVER_USER"@"$SERVER_IP" "ls -l /tmp | grep CalculatorProject || true"

      - name: Copy Python package to server
        if: ${{ github.event.inputs.app == 'python' }}
        env:
          SERVER_IP: ${{ env.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          scp -i ~/.ssh/id_rsa CalculatorProjectPy/systemd/calculator-py.service "$SERVER_USER"@"$SERVER_IP":/tmp/calculator-py.service
          scp -i ~/.ssh/id_rsa artifact-py/calculator-py.tgz "$SERVER_USER"@"$SERVER_IP":/tmp/calculator-py.tgz

      - name: Install, deploy and restart Java service on EC2
        if: ${{ github.event.inputs.app == 'java' }}
        env:
          SERVER_IP: ${{ env.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/id_rsa "$SERVER_USER"@"$SERVER_IP" bash -s << 'EOF'
          set -euo pipefail

          # create directories
          sudo mkdir -p /opt/calculator /var/log/calculator

          # move files
          sudo mv /tmp/CalculatorProject-1.0.jar /opt/calculator/CalculatorProject-1.0.jar
          sudo mv /tmp/calculator.service /etc/systemd/system/calculator.service

          # set ownership
          sudo chown -R root:root /opt/calculator /var/log/calculator

          # ensure Java installed
          if ! command -v java >/dev/null 2>&1; then
            sudo yum update -y
            sudo yum install -y java-17-amazon-corretto-headless
          fi

          # verify java
          if ! command -v java >/dev/null 2>&1; then
            echo "ERROR: Java missing"; java -version || true; exit 1
          fi
          echo "Java ready: $(java -version 2>&1 | head -1)"

          # reload systemd and enable service
          sudo systemctl daemon-reload
          sudo systemctl enable calculator.service

          # stop existing service
          sudo systemctl stop calculator.service || true
          sleep 1

          # verify files exist before start
          if [ ! -f /opt/calculator/CalculatorProject-1.0.jar ]; then
            echo "ERROR: JAR missing"; ls -la /opt/calculator/; exit 1
          fi
          if [ ! -f /etc/systemd/system/calculator.service ]; then
            echo "ERROR: systemd unit missing"; exit 1
          fi

          # start service
          sudo systemctl start calculator.service
          sleep 3
          EOF

      - name: Install, deploy and restart Python service on EC2
        if: ${{ github.event.inputs.app == 'python' }}
        env:
          SERVER_IP: ${{ env.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/id_rsa "$SERVER_USER"@"$SERVER_IP" bash -s << 'EOF'
          set -euo pipefail

          # prepare directories
          sudo mkdir -p /opt/calculator-py /var/log/calculator-py

          # unpack package
          sudo rm -rf /opt/calculator-py
          sudo mkdir -p /opt/calculator-py
          sudo tar -xzf /tmp/calculator-py.tgz -C /opt/calculator-py

          # move systemd unit
          sudo mv /tmp/calculator-py.service /etc/systemd/system/calculator-py.service

          # set permissions
          sudo chown -R root:root /opt/calculator-py /var/log/calculator-py

          # ensure python3
          if ! command -v python3 >/dev/null 2>&1; then
            sudo yum update -y
            sudo yum install -y python3
          fi

          # ensure pip
          if ! python3 -m pip --version >/dev/null 2>&1; then
            sudo yum install -y python3-pip || sudo python3 -m ensurepip --upgrade
          fi

          # install requirements
          sudo python3 -m pip install --no-cache-dir -r /opt/calculator-py/requirements.txt

          # reload systemd and enable service
          sudo systemctl daemon-reload
          sudo systemctl enable calculator-py.service
          sudo systemctl stop calculator-py.service || true
          sleep 1
          sudo systemctl start calculator-py.service
          sleep 3

          # simple smoke test
          if ! curl -fsS --connect-timeout 2 http://localhost:8081/ >/dev/null 2>&1; then
            echo "Python app did not respond"
            sudo journalctl -u calculator-py.service --no-pager -n 200
            exit 1
          fi
          EOF

      - name: Notify success
        run: echo "Deployment to ${{ secrets.SERVER_IP }} completed"

# Secrets required in repository settings:
# - SSH_PRIVATE_KEY : private key with SSH access to the EC2 host
# - SERVER_IP       : public IP or hostname of the EC2 instance
# - SERVER_USER     : ssh user (ec2-user, ubuntu, etc.)

